services:
  auth-rococo-db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${AUTH_DB_PASSWORD}
      - MYSQL_USER=${AUTH_DB_USER}
      - MYSQL_PASSWORD=${AUTH_DB_PASSWORD}
      - MYSQL_DATABASE=${AUTH_DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - rococo_auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${AUTH_DB_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rococo-network

  gateway-rococo-db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${GATEWAY_DB_PASSWORD}
      - MYSQL_USER=${GATEWAY_DB_USER}
      - MYSQL_PASSWORD=${GATEWAY_DB_PASSWORD}
      - MYSQL_DATABASE=${GATEWAY_DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - rococo_gateway_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${GATEWAY_DB_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rococo-network

  rococo-auth:
    build:
      context: ../rococo-auth
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - AUTH_DB_URL=jdbc:mysql://auth-rococo-db:3306/${AUTH_DB_NAME}?serverTimezone=UTC&createDatabaseIfNotExist=true
      - AUTH_DB_USER=${AUTH_DB_USER}
      - AUTH_DB_PASSWORD=${AUTH_DB_PASSWORD}
      - AUTH_DB_NAME=${AUTH_DB_NAME}
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      auth-rococo-db:
        condition: service_healthy
    networks:
      - rococo-network

  rococo-gateway:
    build:
      context: ../rococo-gateway
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    environment:
      - GATEWAY_DB_URL=jdbc:mysql://gateway-rococo-db:3306/${GATEWAY_DB_NAME}?serverTimezone=UTC&createDatabaseIfNotExist=true
      - GATEWAY_DB_USER=root
      - GATEWAY_DB_PASSWORD=${GATEWAY_DB_PASSWORD}
      - GATEWAY_DB_NAME=${GATEWAY_DB_NAME}
      - ROCOCO_FRONT_BASE_URI=http://localhost:8080
      - ROCOCO_AUTH_BASE_URI=http://localhost:9000
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      gateway-rococo-db:
        condition: service_healthy
      rococo-auth:
        condition: service_started
    networks:
      - rococo-network

  rococo-client:
    build:
      context: ../rococo-client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://rococo-gateway:9001
    networks:
      - rococo-network

  rococo-e2e-test:
    build:
      context: ../rococo-e2e-test
      dockerfile: Dockerfile
    environment:
      - TEST_ENV=docker
      - SELENIDE_HEADLESS=true
      - SELENIDE_BASE_URL=http://rococo-client:80
      - AUTH_URL=http://rococo-auth:9000
      - GATEWAY_URL=http://rococo-gateway:9001
    depends_on:
      rococo-auth:
        condition: service_started
      rococo-gateway:
        condition: service_started
      rococo-client:
        condition: service_started
    networks:
      - rococo-network
    profiles:
      - e2e

networks:
  rococo-network:
    name: rococo-network
    driver: bridge

volumes:
  rococo_auth_db_data:
  rococo_gateway_db_data: